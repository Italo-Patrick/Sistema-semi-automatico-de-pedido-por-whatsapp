<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Hamburgueria - Pedidos</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="styles.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Roboto+Condensed:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
</head>
<body>

<div id="loading-screen" class="loading-overlay">
    <div class="loading-content">
        <img src="imgs/icones/logoNoFundo.png" alt="Sua Lanchonete Logo" class="loading-logo">
        <div class="loading-spinner"></div> </div>
</div>
  
<div class="app-container">
  <header>
<div class="topo">
    <img src="imgs/icones/logoNoFundo.png" alt="Logo da lanchonete">
    
    <div class="textos-header">
      <h1>Sua lanchonete</h1>
      <p>Monte seu pedido e envie pelo WhatsApp</p>
    </div>
  </header>

<main>
  <section>
    <h2 class="categorias">Sanduíches</h2>
    <div id="sanduiches"></div>
  </section>

  <section>
    <h2 class="categorias">Bebidas</h2>
    <div id="bebidas"></div>
  </section>

</main>

<!--Pegar endereço-->
<div class="form">
  <input type="text" id="nome" placeholder="Seu nome">
  <input type="text" id="endereco" placeholder="Seu endereço">
  <input type="text" id="obs" placeholder="Observação (opcional)">
</div>

<footer class="footer">
  <div class="total">
    <span>Total:</span>
    <span id="valor-total">R$ 0</span>
  </div>

  <button id="btn-enviar" onclick="enviarPedido()">
    Enviar pedido
  </button>
</footer>
</div>
  <script src="script.js"></script>
</body>
</html>
